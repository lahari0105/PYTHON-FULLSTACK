<!doctype html>
<html lang="en">
<head>
    <title>Document</title>
    <style>
    .ai {
        color: green;
    }

    .cse {
        color: red;
    }

    .ml {
        color: blue;
    }

    h1 {
        color: brown;
    }

    p {
        color: hotpink;
    }

    #csid {
        color: red;
    }
    </style>
</head>
<body>
    <div class="ai">
    <h1>this is ai students</h1>
    <ol>
        <li>Venkata lakshmi</li>
        <li>lahari</li>
        <li>ramya</li>
    </ol>
    </div>
    <div class="cse">
    <h1>This is <span id="csid">cse students</span></h1>
    <ol>
        <li>siva</li>
        <li>harshitha</li>
        <li>sandya</li>
    </ol>
    </div>

    <div class="ml">
    <p>this is ml students</p>
    <ul>
        <li>sujatha</li>
        <li>kalpana</li>
        <li>kavya</li>
    </ul>
    </div>
</body>
</html>
