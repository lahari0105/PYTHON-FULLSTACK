<!doctype html>
<html lang="en">
<head>
    <title>Document</title>
    <style>
    .parent {
        width: 400px;
        height: 400px;
        border: 5px solid red;
        background-image: url("https://plus.unsplash.com/premium_photo-1673292293042-cafd9c8a3ab3?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MXx8bmF0dXJlfGVufDB8fDB8fHww");
        position: relative;
    }

    .parent div {
        width: 30%;
        height: 5%;
        border: 2px solid black;
        background-color: white;
        text-align: center;
    }

    .child1 {
        position: absolute;
        bottom: 0px;
        right: 0px;
    }

    .child2 {
        position: absolute;
        bottom: 0px;
        left: 0px;
    }
    .child3 {
        position: absolute;
        top: 0px;
        left: 0px;
    }

    .child4 {
        position: absolute;
        top: 0px;
        right: 0px;
    }

    .child5 {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
    }
    </style>
</head>
<body>
    <div class="parent">
    <div class="child1">bottom right</div>
    <div class="child2">Bottom left</div>
    <div class="child3">top left</div>
    <div class="child4">top right</div>
    <div class="child5">center</div>
    </div>
</body>
</html>
