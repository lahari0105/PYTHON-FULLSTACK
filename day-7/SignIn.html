<!DOCTYPE html>
<html lang="en">
<head></head>
    <title>SignUp</title>
    <style>
    body {
        background-image: linear-gradient(pink);
    }

    .form-area {
        height: 550px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    form {
        background-color: white;
        width: 350px;
        height: 400px;
        padding: 30px;
        border-radius: 50px;
        display: flex;
        flex-direction: column;
        gap: 5px;
    }
    form > h2 {
        text-align: center;
        text-decoration: underline;
        font-weight: bolder;
    }
    form > input {
        height: 20px;
        border: 2px solid black;
        border-radius: 10px;
    }
    .submit-buttons {
        display: flex;
        justify-content: space-around;
        align-items: center;
    }
    button {
        margin-top: 10px;
        width: 120px;
        height: 40px;
        background-color: hotpink;
        border-radius: 10px;
        border: none;
        font-weight: bold;
        font-size: 15px;
    }

    button:hover {
        background-color: purple;
        color: white;
    }
    </style>
        
</head>
<body>
    <div class="form-area">
    <form>
        <h2>Sign In</h2>
        
        <label for="email">Email: </label>
        <input type="email" id="email" name="email" />

        <label for="pass">Password:</label>
        <input type="password" id="pass" name="pass" />

        <div class="submit-buttons">
        <a href="SignUP.html">Now User? Go to Sign</a>
        <a href="password">Forgot Password</a>
        <button type="submit">Sign Up</button>
        </div>
</body>
</html>
