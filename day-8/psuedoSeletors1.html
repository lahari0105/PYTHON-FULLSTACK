<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
    h1::before{
        content: "*";
    }
    h1::after{
        content: "$";
    }
</style>
</head>
<body>
    <h1>lahari</h1>
    <h1>kavya</h1>
    <h1>uma</h1>
</body>
</html>
