<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            background-color: red;
            border: 10px solid black;
            height: 300px;

            background-color: yellow;
            border-radius : 100%;
            transition-duration : 5s;
        }

</head>

    <div class="box"></div>
