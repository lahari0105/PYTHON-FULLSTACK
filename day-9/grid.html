<!doctype html>
<html lang="en">
<head>
    <title>Grid</title>
    <style>
    .parent {
        width: 500px;
        height: 500px;
        border: 5px solid black;
        padding: 10px;
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 10px;
    }

    .parent > div {
        background-color: yellow;
    }
    </style>
</head>
<body>
    <div class="parent">
    <div class="child1">1</div>
    <div class="child2">2</div>
    <div class="child3">3</div>
    </div>
</body>
</html>
