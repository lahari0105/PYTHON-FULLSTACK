<!doctype html>
<html lang="en">
<head>
    <style>
    .parent {
        width: 500px;
        height: 500px;
        border: 2px solid black;
        display: grid;
        grid-template-rows: 1fr 1fr;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        padding: 10px;
    }

    .parent div {
        background: skyblue;
        border: 1px solid black;
        justify-content: center;
        color: rgb(117, 22, 22);
        font-size: 100px;
        display: flex;
        align-items: center;
    }

    .child1 {
        grid-row: span 2;
    }
    </style>
</head>
<body>
    <div class="parent">
    <div class="child1">1</div>
    <div>2</div>
    <div>3</div>
    </div>
</body>
</html>
