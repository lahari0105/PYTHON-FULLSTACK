<!doctype html>
<html lang="en">
<head>
    <title>Grid Layout</title>
    <style>
    .parent {
        width: 700px;
        height: 500px;
        background-color: purple;
        border: 5px solid black;
        padding: 10px;
        display: grid;
        grid-template-columns: 1fr 1fr 1fr 1fr;
        grid-template-rows: 1fr 1fr 1fr;
        gap: 10px;
    }

    .parent > div {
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 25px;
        color: purple;
    }

    .child1 {
        background: greenyellow;
        grid-row: 1/4;
    }

    .child2 {
        background: greenyellow;
        grid-column: 2/4;
    }

    .child3 {
        background: red;
    }

    .child4 {
        background: yellow;
        color: black;
    }

    .child5 {
        background: orangered;
    }

    .child6 {
        background: greenyellow;
        grid-row: 2/4;
        grid-column: 4;
    }

    .child7 {
        background: red;
    }

    .child8 {
        background: yellow;
        color: black;
    }
    </style>
</head>
<body>
    <div class="parent">
    <div class="child1">1</div>
    <div class="child2">2</div>
    <div class="child3">3</div>
    <div class="child4">4</div>
    <div class="child5">5</div>
    <div class="child6">6</div>
    <div class="child7">7</div>
    <div class="child8">8</div>
    </div>
</body>
</html>
